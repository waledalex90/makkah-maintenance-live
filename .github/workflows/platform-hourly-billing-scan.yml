name: Platform Hourly Billing Scan

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger subscription/invoice scan
        env:
          SCAN_URL: ${{ secrets.PLATFORM_SCAN_URL }}
          BILLING_CRON_SECRET: ${{ secrets.BILLING_CRON_SECRET }}
        run: |
          if [ -z "$SCAN_URL" ]; then
            echo "Missing secret PLATFORM_SCAN_URL"
            exit 1
          fi
          if [ -z "$BILLING_CRON_SECRET" ]; then
            echo "Missing secret BILLING_CRON_SECRET"
            exit 1
          fi
          curl -f -sS -X POST "$SCAN_URL" \
            -H "Authorization: Bearer $BILLING_CRON_SECRET" \
            -H "Content-Type: application/json"
